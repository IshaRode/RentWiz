services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: rentwiz-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: USE_AI_EXPLANATIONS
        value: "false"
      - key: GOOD_DEAL_THRESHOLD
        value: "2000"
      - key: OVERPRICED_THRESHOLD
        value: "-2000"
      - key: ALLOWED_ORIGINS
        sync: false   # Set to your Vercel frontend URL after deploying frontend

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  - type: web
    name: rentwiz-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false   # Set to your backend Render URL e.g. https://rentwiz-backend.onrender.com/api/v1
